name: Build and push docker image

on:
  push:
    branches: [ main ]

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      - name: Check out the repository
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_SECRET_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION_US }}

      - name: Login to ECR
        uses: aws-actions/amazon-ecr-login@v2

      - name: Docker build
        run: |
          docker build \
            --build-arg MONGO_URI="${{ secrets.MONGO_URI }}" \
            -t backend-ecr:latest .

      - name: Docker tag
        run: |
          docker tag backend-ecr:latest \
            ${{ secrets.AWS_ACCOUNT_ID_US }}.dkr.ecr.${{ secrets.AWS_REGION_US }}.amazonaws.com/backend-ecr:${{ github.run_number }}

      - name: Docker push
        run: |
          docker push \
            ${{ secrets.AWS_ACCOUNT_ID_US }}.dkr.ecr.${{ secrets.AWS_REGION_US }}.amazonaws.com/backend-ecr:${{ github.run_number }}